title: Orkestra
description: Self-hosted MCP ticket server for autonomous LLM agents — no cloud, no rate limits.
remote_theme: just-the-docs/just-the-docs@v0.10.0
url: https://vijay431.github.io
baseurl: /Orkestra

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# just-the-docs configuration
search_enabled: true
heading_anchors: true
color_scheme: dark

aux_links:
  "GitHub":
    - "https://github.com/Vijay431/Orkestra"

aux_links_new_tab: true

# Enable Mermaid diagrams
mermaid:
  version: "10.6.1"

# Footer
footer_content: 'Orkestra is <a href="https://github.com/Vijay431/Orkestra/blob/main/LICENSE">MIT licensed</a>. Built with ❤️ for self-hosted agent workflows.'

# Don't include these in the build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
