name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./internal/... ./cmd/...

      - name: Upload coverage
        if: always()
        run: |
          go test -coverprofile=coverage.out ./internal/... ./cmd/... || true
          go tool cover -func=coverage.out | tail -1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: E2E Tests
        run: go test -tags e2e -timeout 60s ./test/e2e/...
