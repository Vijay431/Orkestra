name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug!"
  - type: input
    id: version
    attributes:
      label: "Orkestra version"
      placeholder: "e.g. v0.3.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: "Operating system"
      options:
        - Linux
        - macOS
        - Windows
        - Docker
    validations:
      required: true
  - type: input
    id: project_id
    attributes:
      label: "PROJECT_ID value used"
      placeholder: "e.g. myapp"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: "Steps to reproduce"
      placeholder: "1. Run ...\n2. Call tool ...\n3. See error"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Relevant logs or error output"
      render: shell
    validations:
      required: false
