name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for suggesting an improvement!"
  - type: textarea
    id: problem
    attributes:
      label: "What problem does this solve?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Additional context"
    validations:
      required: false
